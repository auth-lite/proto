syntax = "proto3";

package auth.organization.v1;

import "auth/organization/v1/models.proto";

option go_package = "github.com/kperreau/authlite/gen/go/auth/organization/v1;authOrganization";

service OrganizationService {
  rpc CreateOrganization(CreateOrganizationRequest) returns (CreateOrganizationResponse) {}
  rpc GetOrganization(GetOrganizationRequest) returns (GetOrganizationResponse) {}
  rpc UpdateOrganization(UpdateOrganizationRequest) returns (UpdateOrganizationResponse) {}
  rpc ListMyOrganizations(ListMyOrganizationsRequest) returns (ListMyOrganizationsResponse) {}

  rpc ListOrgMembers(ListOrgMembersRequest) returns (ListOrgMembersResponse) {}
  rpc InviteMember(InviteMemberRequest) returns (InviteMemberResponse) {}
  rpc AcceptInvite(AcceptInviteRequest) returns (AcceptInviteResponse) {}
  rpc UpdateMemberRole(UpdateMemberRoleRequest) returns (UpdateMemberRoleResponse) {}
  rpc RemoveMember(RemoveMemberRequest) returns (RemoveMemberResponse) {}

  rpc ListOrgInvites(ListOrgInvitesRequest) returns (ListOrgInvitesResponse) {}
  rpc DeleteInvite(DeleteInviteRequest) returns (DeleteInviteResponse) {}

  rpc SwitchOrganization(SwitchOrganizationRequest) returns (SwitchOrganizationResponse) {}
}
