syntax = "proto3";

package auth.account.v1;

import "auth/permission/v1/models.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/auth-lite/proto/gen/go/auth/account/v1;authAccount";

message ExternalAccount {
  string id = 1;
  string account_id = 2;
  string email = 3;
  string provider = 4;
  string provider_id = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message Account {
  string id = 1;
  string email = 2;
  bool is_disabled = 3;
  string disabled_reason = 4;
  string role = 5;
  repeated auth.permission.v1.Permission permissions = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
  string fullname = 9;
  string profile_picture = 10;
}

message ListExternalAccountsByAccountIdRequest {
  string account_id = 1;
}

message ListExternalAccountsByAccountIdResponse {
  repeated ExternalAccount external_accounts = 1;
}

message ListAccountsRequest {
  google.protobuf.Timestamp created_at = 1;
  bytes page = 2;
  uint32 limit = 3;
}

message ListAccountsResponse {
  repeated Account accounts = 1;
  uint64 total = 2;
  bytes next_page = 3;
}

message GetAccountRequest {
  string id = 1;
}

message GetAccountResponse {
  Account account = 1;
}

message GetAccountsRequest {
  repeated string ids = 1;
}

message GetAccountsResponse {
  repeated Account accounts = 1;
}

message GetAccountByEmailRequest {
  string email = 1;
}

message GetAccountByEmailResponse {
  Account account = 1;
}

message CreateAccountRequest {
  Account account = 1;
}

message CreateAccountResponse {
  Account account = 1;
}

message UpdateAccountRequest {
  Account account = 1;
  repeated string fields_to_update = 2;
}

message UpdateAccountResponse {}

message DeleteAccountRequest {
  string id = 1;
}

message DeleteAccountResponse {}

message FindExternalAccountsByEmailRequest {
  string email = 1;
  uint32 limit = 2;
}

message FindExternalAccountsByEmailResponse {
  repeated ExternalAccount external_accounts = 1;
}

message GetOrCreateAccountRequest {
  ExternalAccount external_account = 1;
}

message GetOrCreateAccountResponse {
  Account account = 1;
  bool is_new_account = 2;
}

message CreateExternalAccountRequest {
  ExternalAccount external_account = 1;
}

message CreateExternalAccountResponse {
  ExternalAccount external_account = 1;
}

message UpdateExternalAccountRequest {
  ExternalAccount external_account = 1;
  repeated string fields_to_update = 2;
}

message UpdateExternalAccountResponse {}

message DeleteExternalAccountRequest {
  string id = 1;
}

message DeleteExternalAccountResponse {}
