syntax = "proto3";

package api.pagination.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/auth-lite/proto/gen/go/api/pagination/v1;api_pagination";

message PaginationDate {
  google.protobuf.Timestamp date = 1;
  string id = 2;
}

enum PaginationKey {
  PAGINATION_KEY_UNSPECIFIED = 0;
}

message Pagination {
  uint64 counter = 1;
  PaginationKey pagination_key = 2;
  oneof page {
    bytes state = 3;
  }
}
